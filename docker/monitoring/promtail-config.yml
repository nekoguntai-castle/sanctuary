# Promtail Configuration for Sanctuary
# Collects logs from Docker containers

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /promtail/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Sanctuary container logs
  - job_name: sanctuary
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values:
              - com.docker.compose.project=sanctuary

    relabel_configs:
      # Only keep Sanctuary containers
      - source_labels: ['__meta_docker_container_name']
        regex: '/sanctuary-.*'
        action: keep

      # Ensure every stream has a stable non-empty Loki label.
      - source_labels: ['__meta_docker_container_name']
        regex: '/sanctuary-.*'
        target_label: job
        replacement: sanctuary

      # Add container name as label
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container

      # Add service label based on container name
      - source_labels: ['__meta_docker_container_name']
        regex: '/sanctuary-(.*)'
        target_label: service

      # Add container ID for correlation with Docker inspect/log output
      - source_labels: ['__meta_docker_container_id']
        target_label: container_id

      # Keep the log path
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: stream

    pipeline_stages:
      # Parse JSON logs from Docker
      - docker: {}

      # Keep a stable non-empty Loki label even when log lines do not match
      # Sanctuary's structured application log format.
      - static_labels:
          job: sanctuary

      # Extract Sanctuary log format
      - regex:
          expression: '^\[(?P<timestamp>[^\]]+)\]\s+(?P<level>DEBUG|INFO|WARN|ERROR)\s+\[(?P<component>[^\]]+)\]\s*(?P<message>.*)'

      - labels:
          level:
          component:

      - timestamp:
          source: timestamp
          format: "2006-01-02T15:04:05.000Z"
