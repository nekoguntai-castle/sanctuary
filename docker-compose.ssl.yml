# =============================================
# Sanctuary Bitcoin Wallet - HTTPS Only
# =============================================
# Usage:
#   set -a; source "${SANCTUARY_ENV_FILE:-.env}"; set +a
#   SANCTUARY_SSL_DIR="${SANCTUARY_SSL_DIR:-./docker/nginx/ssl}" HTTPS_PORT=8443 docker compose -f docker-compose.yml -f docker-compose.ssl.yml up --build
#
# Prerequisites:
#   1. Generate certificates:
#      SANCTUARY_SSL_DIR="${HOME}/.config/sanctuary/ssl" bash docker/nginx/ssl/generate-certs.sh localhost
#   2. Or use mkcert for locally-trusted certificates:
#      mkcert -install
#      mkcert -key-file "${SANCTUARY_SSL_DIR}/privkey.pem" -cert-file "${SANCTUARY_SSL_DIR}/fullchain.pem" localhost 127.0.0.1
#
# Environment variables:
#   HTTPS_PORT - HTTPS port (default: 8443)
#   HTTP_PORT - HTTP port for redirect (default: 8080)
#   SANCTUARY_SSL_DIR - directory containing fullchain.pem and privkey.pem
# =============================================

services:
  frontend:
    environment:
      ENABLE_SSL: "true"
      HTTPS_REDIRECT_PORT: "${HTTPS_PORT:-8443}"
    ports:
      - "${HTTPS_PORT:-8443}:443"
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - ${SANCTUARY_SSL_DIR:-./docker/nginx/ssl}:/etc/nginx/ssl:ro
