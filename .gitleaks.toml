title = "Sanctuary gitleaks config"

# Inherit the default gitleaks ruleset (AWS, Stripe, Slack, PEM, etc.).
# This file layers project-specific allowlists on top.
[extend]
useDefault = true

# Global allowlist: these regex targets match *intentional* test fixtures,
# example files, or placeholder defaults that carry no real credentials.
# Anything else — including real keys in any other path — will still be
# flagged.
[allowlist]
description = "Allowlist for test fixtures and example placeholders"

paths = [
  # Push-notification test fixtures ship deliberately-broken PEM blocks
  # (for example, private-key PEM placeholder blocks)
  # so the server/gateway providers have something parseable to exercise
  # against. These files have been inspected during the 2026-04-13
  # /grade audit and contain no real key material.
  '''server/tests/unit/services/push/providers/apns\.test\.ts''',
  '''server/tests/unit/services/push/providers/fcm\.test\.ts''',
  '''gateway/tests/unit/services/push/apns\.test\.ts''',
  '''gateway/tests/unit/services/push/fcm\.test\.ts''',
  # Grade-report task files may mention PEM sentinels while documenting
  # secret-scan false positives; they must not carry real key material.
  '''tasks/grade-fix-plan\.md''',
  '''tasks/grade-report-2026-04-13-c76\.md''',
  # The verify-vectors workflow talks to a local regtest Bitcoin Core service
  # with fixed disposable RPC credentials.
  '''\.github/workflows/verify-vectors\.yml''',
  # Canonical Bitcoin protocol vectors and test-only placeholders. These files
  # are intentionally committed fixtures, not operational secrets.
  '''server/tests/fixtures/bip340-test-vectors\.ts''',
  '''server/tests/setup\.ts''',
  '''server/tests/integration/ops/phase2OperationsProof\.integration\.test\.ts''',
  '''server/tests/unit/api/auth\.test\.ts''',
  '''server/tests/unit/api/schemas/admin-auth-device-sync\.test\.ts''',
  '''server/tests/unit/security/securityAudit\.test\.ts''',
  '''server/tests/unit/services/bitcoin/addressDerivation\.test\.ts''',
  '''server/tests/unit/utils/redact\.test\.ts''',
  '''tests/components/BackupRestore\.test\.tsx''',
  '''tests/components/BackupRestore/EncryptionKeyDisplay\.branches\.test\.tsx''',
  '''tests/install/e2e/auth-flow\.test\.sh''',
  '''e2e/admin-operations\.spec\.ts''',
  '''e2e/render-regression\.spec\.ts''',
  '''e2e/render-regression/renderRegressionHarness\.ts''',
  # .env.example ships default placeholders, not real secrets.
  '''\.env\.example$''',
  '''server/\.env\.example$''',
  # Prisma client generated output never contains secrets and trips
  # heuristic entropy checks on random-looking identifiers.
  '''server/src/generated/''',
  # Lock files are reproducible from package.json and have no secrets.
  '''package-lock\.json$''',
  '''.*/package-lock\.json$''',
  # Vendored dependencies.
  '''node_modules/''',
  '''.*/node_modules/''',
]

regexes = [
  # Example API key string used only in redaction documentation and tests.
  '''sk_live_abc123xyz789''',
]

# Rule-specific allowlists can be added below as the tool matures.
# Start wide, tighten as false positives are understood.
