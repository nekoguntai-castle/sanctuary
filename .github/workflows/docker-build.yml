name: Build Dev Images

# Builds bleeding-edge images from main branch.
# For versioned release images, see release.yml
#
# Images built:
#   - ghcr.io/nekoguntai-castle/sanctuary-frontend:main
#   - ghcr.io/nekoguntai-castle/sanctuary-backend:main

on:
  push:
    branches:
      - main
    paths:
      - 'App.tsx'
      - 'components/**'
      - 'contexts/**'
      - 'hooks/**'
      - 'index.html'
      - 'index.tsx'
      - 'providers/**'
      - 'services/**'
      - 'src/**'
      - 'themes/**'
      - 'utils/**'
      - 'shared/**'
      - 'server/**'
      - '!server/*.md'
      - '!server/**/*.md'
      - '!server/*.mdx'
      - '!server/**/*.mdx'
      - 'docker/**'
      - 'Dockerfile'
      - '.dockerignore'
      - 'docker-compose.yml'
      - 'package*.json'
      - 'tsconfig*.json'
      - 'vite*.ts'
      - '.github/workflows/docker-build.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'App.tsx'
      - 'components/**'
      - 'contexts/**'
      - 'hooks/**'
      - 'index.html'
      - 'index.tsx'
      - 'providers/**'
      - 'services/**'
      - 'src/**'
      - 'themes/**'
      - 'utils/**'
      - 'shared/**'
      - 'server/**'
      - '!server/*.md'
      - '!server/**/*.md'
      - '!server/*.mdx'
      - '!server/**/*.mdx'
      - 'docker/**'
      - 'Dockerfile'
      - '.dockerignore'
      - 'docker-compose.yml'
      - 'package*.json'
      - 'tsconfig*.json'
      - 'vite*.ts'
      - '.github/workflows/docker-build.yml'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || github.event_name == 'push' }}

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    # Build frontend and backend in parallel using matrix
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: frontend
            context: .
            file: ./Dockerfile
          - name: backend
            context: .
            file: ./server/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Generate platform-specific README
        run: |
          chmod +x scripts/generate-readme.sh
          ./scripts/generate-readme.sh github

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.name }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  summary:
    runs-on: ubuntu-latest
    needs: build
    if: always() && github.event_name != 'pull_request'
    steps:
      - name: Summary
        run: |
          echo "## Dev Images Built" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Bleeding-edge images from \`main\` branch:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.REGISTRY }}/${{ github.repository }}-frontend:main\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.REGISTRY }}/${{ github.repository }}-backend:main\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> For stable releases, use versioned tags (e.g., \`v0.6.0\`) or \`latest\`" >> $GITHUB_STEP_SUMMARY
