name: Release Candidate Validation

# This workflow runs the FULL install test suite including upgrade tests.
# Use this before cutting a release to thoroughly validate the installation process.
#
# Recommended workflow:
# 1. Run this workflow manually on the commit you plan to release
# 2. Wait for all tests to pass (including upgrade tests)
# 3. Create the release tag
# 4. The regular install-test workflow will run release-critical tests on the tag
#
# Total runtime: ~25-35 minutes

on:
  workflow_call:
    inputs:
      ref:
        description: 'Git ref to test'
        required: false
        default: 'main'
        type: string
      version:
        description: 'Version being validated'
        required: false
        type: string
      upgrade_source_ref:
        description: 'Optional older git ref or tag to install before upgrading to the candidate ref'
        required: false
        type: string
      include_full_upgrade_recovery:
        description: 'Run one full-mode baseline upgrade recovery lane in addition to the core matrix'
        required: false
        default: false
        type: boolean
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to test (branch, tag, or SHA)'
        required: false
        default: 'main'
        type: string
      version:
        description: 'Version being validated (for logging only)'
        required: false
        type: string
      upgrade_source_ref:
        description: 'Optional older git ref or tag to install before upgrading to the candidate ref'
        required: false
        type: string
      include_full_upgrade_recovery:
        description: 'Run one full-mode baseline upgrade recovery lane in addition to the core matrix'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ inputs.ref || github.event.inputs.ref || github.ref }}
  cancel-in-progress: true

env:
  HTTPS_PORT: 8443
  HTTP_PORT: 8080

jobs:
  # ============================================
  # Validation Info
  # ============================================
  validation-info:
    name: Validation Info
    runs-on: ubuntu-latest
    steps:
      - name: Display validation context
        run: |
          echo "## Release Candidate Validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Git Ref | \`${{ github.event.inputs.ref || inputs.ref || 'main' }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | ${{ github.event.inputs.version || inputs.version || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Full Upgrade Recovery | ${{ github.event.inputs.include_full_upgrade_recovery || inputs.include_full_upgrade_recovery || false }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered By | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Time | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "This workflow runs the **full** install test suite including upgrade tests." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY

  # ============================================
  # Unit Tests
  # ============================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.event.inputs.ref || inputs.ref || 'main' }}
          fetch-depth: 0

      - name: Make test scripts executable
        run: chmod +x tests/install/unit/*.sh tests/install/e2e/*.sh tests/install/utils/*.sh

      - name: Run unit tests
        run: |
          ./tests/install/unit/install-script.test.sh
          ./tests/install/unit/reset-user-2fa-script.test.sh
          ./tests/install/unit/upgrade-helpers.test.sh
          ./tests/install/unit/install-scope.test.sh

  # ============================================
  # Fresh Install E2E Test
  # ============================================
  fresh-install-test:
    name: Fresh Install E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.event.inputs.ref || inputs.ref || 'main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Make test scripts executable
        run: chmod +x tests/install/unit/*.sh tests/install/e2e/*.sh tests/install/utils/*.sh

      - name: Run fresh install test
        env:
          HTTPS_PORT: ${{ env.HTTPS_PORT }}
          HTTP_PORT: ${{ env.HTTP_PORT }}
        run: ./tests/install/e2e/fresh-install.test.sh --verbose

      - name: Show container logs on failure
        if: failure()
        run: |
          echo "=== Container Status ==="
          docker compose ps || true
          echo ""
          echo "=== Database Logs ==="
          docker compose logs --tail 100 postgres 2>&1 || true
          echo ""
          echo "=== Backend Logs ==="
          docker compose logs --tail 100 backend 2>&1 || true
          echo ""
          echo "=== Frontend Logs ==="
          docker compose logs --tail 100 frontend 2>&1 || true
          echo ""
          echo "=== Gateway Logs ==="
          docker compose logs --tail 100 gateway 2>&1 || true

      - name: Cleanup
        if: always()
        run: |
          docker compose down -v --remove-orphans || true
          docker system prune -f || true

  # ============================================
  # Container Health Test (non-blocking)
  # ============================================
  container-health-test:
    name: Container Health
    runs-on: ubuntu-latest
    needs: fresh-install-test
    continue-on-error: true  # Non-blocking - failures are warnings
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.event.inputs.ref || inputs.ref || 'main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Make test scripts executable
        run: chmod +x tests/install/unit/*.sh tests/install/e2e/*.sh tests/install/utils/*.sh

      - name: Start containers
        env:
          HTTPS_PORT: ${{ env.HTTPS_PORT }}
          HTTP_PORT: ${{ env.HTTP_PORT }}
        run: |
          # Generate all required secrets
          JWT_SECRET=$(openssl rand -base64 32 | tr -d '=/+' | head -c 48)
          ENCRYPTION_KEY=$(openssl rand -base64 32 | tr -d '=/+' | head -c 48)
          GATEWAY_SECRET=$(openssl rand -base64 32 | tr -d '=/+' | head -c 48)
          POSTGRES_PASSWORD=$(openssl rand -base64 16 | tr -d '=/+' | head -c 24)
          AI_CONFIG_SECRET=$(openssl rand -hex 32)
          REDIS_PASSWORD=$(openssl rand -base64 16 | tr -d '=/+' | head -c 24)
          cd docker/nginx/ssl && ./generate-certs.sh localhost && cd ../../..
          # Build first, then start (migrate container needs backend image)
          JWT_SECRET="$JWT_SECRET" ENCRYPTION_KEY="$ENCRYPTION_KEY" \
            GATEWAY_SECRET="$GATEWAY_SECRET" POSTGRES_PASSWORD="$POSTGRES_PASSWORD" \
            AI_CONFIG_SECRET="$AI_CONFIG_SECRET" REDIS_PASSWORD="$REDIS_PASSWORD" \
            HTTPS_PORT=$HTTPS_PORT HTTP_PORT=$HTTP_PORT \
            docker compose build
          JWT_SECRET="$JWT_SECRET" ENCRYPTION_KEY="$ENCRYPTION_KEY" \
            GATEWAY_SECRET="$GATEWAY_SECRET" POSTGRES_PASSWORD="$POSTGRES_PASSWORD" \
            AI_CONFIG_SECRET="$AI_CONFIG_SECRET" REDIS_PASSWORD="$REDIS_PASSWORD" \
            HTTPS_PORT=$HTTPS_PORT HTTP_PORT=$HTTP_PORT \
            docker compose up -d

      - name: Wait for migration to complete
        run: |
          echo "Waiting for migration container to finish..."
          for i in {1..60}; do
            STATUS=$(docker compose ps migrate --format "{{.Status}}" 2>/dev/null | grep -oE '^[A-Za-z]+' || echo "not_found")
            if [ "$STATUS" = "Exited" ]; then
              EXIT_STATUS=$(docker compose ps migrate --format "{{.Status}}" 2>/dev/null)
              if echo "$EXIT_STATUS" | grep -q "(0)"; then
                echo "Migration completed successfully"
                break
              else
                echo "Migration failed: $EXIT_STATUS"
                docker compose logs --tail 50 migrate
                exit 1
              fi
            fi
            echo "Waiting for migration... (attempt $i/60, status: $STATUS)"
            sleep 5
          done
          # Wait for backend to be healthy after migration
          echo "Waiting for backend to be healthy..."
          for i in {1..30}; do
            if docker compose exec backend wget -q -O - http://localhost:3001/health >/dev/null 2>&1; then
              echo "Backend is healthy"
              break
            fi
            echo "Waiting for backend... (attempt $i/30)"
            sleep 2
          done

      - name: Run container health tests
        env:
          HTTPS_PORT: ${{ env.HTTPS_PORT }}
        run: ./tests/install/e2e/container-health.test.sh --verbose

      - name: Cleanup
        if: always()
        run: docker compose down -v --remove-orphans || true

  # ============================================
  # Authentication Flow Test (non-blocking)
  # ============================================
  auth-flow-test:
    name: Auth Flow
    runs-on: ubuntu-latest
    needs: fresh-install-test
    continue-on-error: true  # Non-blocking - failures are warnings
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.event.inputs.ref || inputs.ref || 'main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Make test scripts executable
        run: chmod +x tests/install/unit/*.sh tests/install/e2e/*.sh tests/install/utils/*.sh

      - name: Start containers
        env:
          HTTPS_PORT: ${{ env.HTTPS_PORT }}
          HTTP_PORT: ${{ env.HTTP_PORT }}
        run: |
          # Generate all 4 required secrets
          JWT_SECRET=$(openssl rand -base64 32 | tr -d '=/+' | head -c 48)
          ENCRYPTION_KEY=$(openssl rand -base64 32 | tr -d '=/+' | head -c 48)
          GATEWAY_SECRET=$(openssl rand -base64 32 | tr -d '=/+' | head -c 48)
          POSTGRES_PASSWORD=$(openssl rand -base64 16 | tr -d '=/+' | head -c 24)
          AI_CONFIG_SECRET=$(openssl rand -hex 32)
          REDIS_PASSWORD=$(openssl rand -base64 16 | tr -d '=/+' | head -c 24)
          cd docker/nginx/ssl && ./generate-certs.sh localhost && cd ../../..
          # Build first, then start (migrate container needs backend image)
          # Raise auth rate limits for stressy auth-flow test sequences
          JWT_SECRET="$JWT_SECRET" ENCRYPTION_KEY="$ENCRYPTION_KEY" \
            GATEWAY_SECRET="$GATEWAY_SECRET" POSTGRES_PASSWORD="$POSTGRES_PASSWORD" \
            AI_CONFIG_SECRET="$AI_CONFIG_SECRET" REDIS_PASSWORD="$REDIS_PASSWORD" \
            HTTPS_PORT=$HTTPS_PORT HTTP_PORT=$HTTP_PORT \
            RATE_LIMIT_LOGIN=100 RATE_LIMIT_PASSWORD_CHANGE=100 \
            docker compose build
          JWT_SECRET="$JWT_SECRET" ENCRYPTION_KEY="$ENCRYPTION_KEY" \
            GATEWAY_SECRET="$GATEWAY_SECRET" POSTGRES_PASSWORD="$POSTGRES_PASSWORD" \
            AI_CONFIG_SECRET="$AI_CONFIG_SECRET" REDIS_PASSWORD="$REDIS_PASSWORD" \
            HTTPS_PORT=$HTTPS_PORT HTTP_PORT=$HTTP_PORT \
            RATE_LIMIT_LOGIN=100 RATE_LIMIT_PASSWORD_CHANGE=100 \
            docker compose up -d

      - name: Wait for migration to complete
        run: |
          echo "Waiting for migration container to finish..."
          for i in {1..60}; do
            STATUS=$(docker compose ps migrate --format "{{.Status}}" 2>/dev/null | grep -oE '^[A-Za-z]+' || echo "not_found")
            if [ "$STATUS" = "Exited" ]; then
              EXIT_STATUS=$(docker compose ps migrate --format "{{.Status}}" 2>/dev/null)
              if echo "$EXIT_STATUS" | grep -q "(0)"; then
                echo "Migration completed successfully"
                break
              else
                echo "Migration failed: $EXIT_STATUS"
                docker compose logs --tail 50 migrate
                exit 1
              fi
            fi
            echo "Waiting for migration... (attempt $i/60, status: $STATUS)"
            sleep 5
          done
          # Wait for backend to be healthy after migration
          echo "Waiting for backend to be healthy..."
          for i in {1..30}; do
            if docker compose exec backend wget -q -O - http://localhost:3001/health >/dev/null 2>&1; then
              echo "Backend is healthy"
              break
            fi
            echo "Waiting for backend... (attempt $i/30)"
            sleep 2
          done

      - name: Run auth flow tests
        env:
          HTTPS_PORT: ${{ env.HTTPS_PORT }}
        run: ./tests/install/e2e/auth-flow.test.sh --verbose

      - name: Cleanup
        if: always()
        run: docker compose down -v --remove-orphans || true

  # ============================================
  # Upgrade Matrix (release blocking)
  # ============================================
  upgrade-test:
    name: Upgrade ${{ matrix.source_ref }} / ${{ matrix.fixture }}
    runs-on: ubuntu-latest
    needs: fresh-install-test
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - source_ref: latest-stable
            fixture: baseline
          - source_ref: n-2
            fixture: baseline
          - source_ref: latest-stable
            fixture: browser-origin-ip
          - source_ref: latest-stable
            fixture: legacy-runtime-env
          - source_ref: latest-stable
            fixture: notification-delivery

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.event.inputs.ref || inputs.ref || 'main' }}
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Make test scripts executable
        run: chmod +x tests/install/unit/*.sh tests/install/e2e/*.sh tests/install/utils/*.sh

      - name: Run core upgrade test
        env:
          HTTPS_PORT: ${{ env.HTTPS_PORT }}
          HTTP_PORT: ${{ env.HTTP_PORT }}
          SANCTUARY_UPGRADE_SOURCE_REF: ${{ github.event.inputs.upgrade_source_ref || inputs.upgrade_source_ref || matrix.source_ref }}
          SANCTUARY_UPGRADE_FIXTURE: ${{ matrix.fixture }}
          SANCTUARY_UPGRADE_ARTIFACT_DIR: .tmp/upgrade-artifacts/${{ matrix.source_ref }}-${{ matrix.fixture }}
        run: ./tests/install/e2e/upgrade-install.test.sh --mode core --fixture "${{ matrix.fixture }}" --verbose

      - name: Show container logs on failure
        if: failure()
        run: |
          docker compose ps || true
          docker compose logs --tail 50 postgres 2>&1 || true
          docker compose logs --tail 100 backend 2>&1 || true

      - name: Upload upgrade artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: upgrade-${{ matrix.source_ref }}-${{ matrix.fixture }}
          path: .tmp/upgrade-artifacts/${{ matrix.source_ref }}-${{ matrix.fixture }}
          if-no-files-found: ignore

      - name: Cleanup
        if: always()
        run: docker compose down -v --remove-orphans || true

  upgrade-full-recovery-test:
    name: Upgrade Full Recovery
    runs-on: ubuntu-latest
    needs: fresh-install-test
    if: ${{ github.event.inputs.include_full_upgrade_recovery == 'true' || inputs.include_full_upgrade_recovery == true }}
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.event.inputs.ref || inputs.ref || 'main' }}
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Make test scripts executable
        run: chmod +x tests/install/unit/*.sh tests/install/e2e/*.sh tests/install/utils/*.sh

      - name: Run full recovery upgrade test
        env:
          HTTPS_PORT: ${{ env.HTTPS_PORT }}
          HTTP_PORT: ${{ env.HTTP_PORT }}
          SANCTUARY_UPGRADE_SOURCE_REF: ${{ github.event.inputs.upgrade_source_ref || inputs.upgrade_source_ref || 'latest-stable' }}
          SANCTUARY_UPGRADE_FIXTURE: baseline
          SANCTUARY_UPGRADE_ARTIFACT_DIR: .tmp/upgrade-artifacts/full-recovery
        run: ./tests/install/e2e/upgrade-install.test.sh --mode full --fixture baseline --verbose

      - name: Show container logs on failure
        if: failure()
        run: |
          docker compose ps || true
          docker compose logs --tail 50 postgres 2>&1 || true
          docker compose logs --tail 100 backend 2>&1 || true

      - name: Upload upgrade artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: upgrade-full-recovery
          path: .tmp/upgrade-artifacts/full-recovery
          if-no-files-found: ignore

      - name: Cleanup
        if: always()
        run: docker compose down -v --remove-orphans || true

  # ============================================
  # Validation Summary
  # ============================================
  validation-summary:
    name: Validation Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, fresh-install-test, container-health-test, auth-flow-test, upgrade-test, upgrade-full-recovery-test]
    if: always()

    steps:
      - name: Generate validation report
        run: |
          echo "## Validation Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Determine overall status
          ALL_PASSED=true

          echo "| Test Suite | Result | Duration |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|--------|----------|" >> $GITHUB_STEP_SUMMARY

          # Unit tests
          if [ "${{ needs.unit-tests.result }}" == "success" ]; then
            echo "| Unit Tests | :white_check_mark: Passed | ~5s |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Unit Tests | :x: Failed | - |" >> $GITHUB_STEP_SUMMARY
            ALL_PASSED=false
          fi

          # Fresh install
          if [ "${{ needs.fresh-install-test.result }}" == "success" ]; then
            echo "| Fresh Install E2E | :white_check_mark: Passed | ~5-10m |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Fresh Install E2E | :x: Failed | - |" >> $GITHUB_STEP_SUMMARY
            ALL_PASSED=false
          fi

          # Container health
          if [ "${{ needs.container-health-test.result }}" == "success" ]; then
            echo "| Container Health | :white_check_mark: Passed | ~2m |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Container Health | :x: Failed | - |" >> $GITHUB_STEP_SUMMARY
            ALL_PASSED=false
          fi

          # Auth flow
          if [ "${{ needs.auth-flow-test.result }}" == "success" ]; then
            echo "| Auth Flow | :white_check_mark: Passed | ~2m |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Auth Flow | :x: Failed | - |" >> $GITHUB_STEP_SUMMARY
            ALL_PASSED=false
          fi

          # Upgrade matrix
          if [ "${{ needs.upgrade-test.result }}" == "success" ]; then
            echo "| Upgrade Matrix | :white_check_mark: Passed | ~10-20m per lane |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Upgrade Matrix | :x: Failed | - |" >> $GITHUB_STEP_SUMMARY
            ALL_PASSED=false
          fi

          # Full recovery upgrade lane
          if [ "${{ needs.upgrade-full-recovery-test.result }}" == "success" ]; then
            echo "| Upgrade Full Recovery | :white_check_mark: Passed | ~20-35m |" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.upgrade-full-recovery-test.result }}" == "skipped" ]; then
            echo "| Upgrade Full Recovery | :arrow_right: Skipped | enable include_full_upgrade_recovery to run |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Upgrade Full Recovery | :x: Failed | - |" >> $GITHUB_STEP_SUMMARY
            ALL_PASSED=false
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Core tests determine release approval. Upgrade matrix is now a
          # release-blocking core lane because upgrade regressions can lock
          # operators out of existing nodes.
          CORE_PASSED=true
          if [ "${{ needs.unit-tests.result }}" != "success" ] || \
             [ "${{ needs.fresh-install-test.result }}" != "success" ] || \
             [ "${{ needs.upgrade-test.result }}" != "success" ] || \
             { [ "${{ needs.upgrade-full-recovery-test.result }}" != "success" ] && \
               [ "${{ needs.upgrade-full-recovery-test.result }}" != "skipped" ]; }; then
            CORE_PASSED=false
          fi

          if [ "$CORE_PASSED" == "true" ]; then
            if [ "$ALL_PASSED" == "true" ]; then
              echo "## :rocket: Release Candidate APPROVED" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "All install tests passed. This commit is ready for release." >> $GITHUB_STEP_SUMMARY
            else
              echo "## :rocket: Release Candidate APPROVED (with warnings)" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "Core tests (Unit + Fresh Install + Upgrade Matrix) passed. Extended tests have non-blocking failures." >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "> **Note:** Extended test failures may indicate upgrade-specific or environment-specific risk." >> $GITHUB_STEP_SUMMARY
              echo "> Review failed tests before release even though they do not yet hard-block this workflow." >> $GITHUB_STEP_SUMMARY
            fi
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Next steps:**" >> $GITHUB_STEP_SUMMARY
            echo "1. Create a release tag on this commit" >> $GITHUB_STEP_SUMMARY
            echo "2. The release workflow will run additional validation" >> $GITHUB_STEP_SUMMARY
            echo "3. Docker images will be built and pushed" >> $GITHUB_STEP_SUMMARY
          else
            echo "## :stop_sign: Release Candidate REJECTED" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Core install tests failed. **Do not release this commit.**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Review the failed tests and fix issues before attempting release." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check validation result
        run: |
          # Core tests that MUST pass for release
          if [ "${{ needs.unit-tests.result }}" != "success" ] || \
             [ "${{ needs.fresh-install-test.result }}" != "success" ] || \
             [ "${{ needs.upgrade-test.result }}" != "success" ] || \
             { [ "${{ needs.upgrade-full-recovery-test.result }}" != "success" ] && \
               [ "${{ needs.upgrade-full-recovery-test.result }}" != "skipped" ]; }; then
            echo "::error::Release candidate validation FAILED - core tests did not pass."
            exit 1
          fi

          # Extended tests - warn but don't block release
          WARNINGS=0
          if [ "${{ needs.container-health-test.result }}" != "success" ]; then
            echo "::warning::Container Health test failed (non-blocking)"
            WARNINGS=$((WARNINGS + 1))
          fi
          if [ "${{ needs.auth-flow-test.result }}" != "success" ]; then
            echo "::warning::Auth Flow test failed (non-blocking)"
            WARNINGS=$((WARNINGS + 1))
          fi
          if [ $WARNINGS -gt 0 ]; then
            echo "Release candidate validation PASSED with $WARNINGS warning(s)"
          else
            echo "Release candidate validation PASSED!"
          fi
