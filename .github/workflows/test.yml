name: Test Suite

on:
  pull_request:
    branches:
      - main
  merge_group:
    types:
      - checks_requested
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'index.html'
      - 'components/**'
      - 'hooks/**'
      - 'contexts/**'
      - 'providers/**'
      - 'services/**'
      - 'themes/**'
      - 'utils/**'
      - 'shared/**'
      - 'tests/**'
      - 'ai-proxy/**'
      - 'server/**'
      - 'gateway/**'
      - 'e2e/**'
      - 'scripts/**'
      - 'package*.json'
      - 'server/package*.json'
      - 'gateway/package*.json'
      - 'vitest.config.ts'
      - 'server/vitest.config.ts'
      - 'gateway/vitest.config.ts'
      - 'playwright.config.ts'
      - '.github/mutation-baseline.json'
      - '.github/workflows/test.yml'
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || github.event_name == 'push' || github.event_name == 'merge_group' }}

env:
  NODE_VERSION: '24'

jobs:
  # ============================================
  # PR Quick Lane (changed-files based)
  # ============================================
  detect-changes:
    name: Detect Changed Files
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      frontend_changed: ${{ steps.filter.outputs.frontend }}
      frontend_files: ${{ steps.filter.outputs.frontend_files }}
      backend_changed: ${{ steps.filter.outputs.backend }}
      backend_files: ${{ steps.filter.outputs.backend_files }}
      critical_mutation_changed: ${{ steps.filter.outputs.critical_mutation }}
      critical_mutation_files: ${{ steps.filter.outputs.critical_mutation_files }}
      gateway_changed: ${{ steps.filter.outputs.gateway }}
      gateway_files: ${{ steps.filter.outputs.gateway_files }}
      e2e_changed: ${{ steps.filter.outputs.e2e }}
      test_files: ${{ steps.filter.outputs.test_files_files }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d
        with:
          list-files: shell
          filters: |
            frontend:
              - 'App.tsx'
              - 'index.html'
              - 'index.tsx'
              - 'src/**'
              - 'components/**'
              - 'hooks/**'
              - 'contexts/**'
              - 'providers/**'
              - 'services/**'
              - 'themes/**'
              - 'shared/**'
              - 'tests/**'
              - 'vitest.config.ts'
              - 'package*.json'
            backend:
              - 'server/**'
            critical_mutation:
              - 'server/src/services/bitcoin/addressDerivation.ts'
              - 'server/src/services/bitcoin/addressDerivation/**'
              - 'server/src/services/bitcoin/psbtValidation.ts'
              - 'server/src/services/bitcoin/psbtInfo.ts'
              - 'server/src/middleware/auth.ts'
              - 'server/src/services/accessControl.ts'
              - 'server/tests/unit/services/bitcoin/addressDerivation.verified.test.ts'
              - 'server/tests/unit/services/bitcoin/psbt.verified.test.ts'
              - 'server/tests/unit/services/bitcoin/psbtValidation.test.ts'
              - 'server/tests/unit/services/bitcoin/psbtInfo.test.ts'
              - 'server/tests/unit/middleware/auth.test.ts'
              - 'server/tests/unit/services/accessControl.test.ts'
              - 'server/stryker.critical.config.mjs'
              - 'server/scripts/mutation/**'
              - '.github/mutation-baseline.json'
            gateway:
              - 'gateway/**'
            e2e:
              - 'e2e/**'
              - 'playwright.config.ts'
            test_files:
              - 'tests/**/*.test.ts'
              - 'tests/**/*.test.tsx'
              - 'tests/**/*.spec.ts'
              - 'tests/**/*.spec.tsx'
              - 'server/tests/**/*.test.ts'
              - 'server/tests/**/*.spec.ts'
              - 'gateway/tests/**/*.test.ts'
              - 'gateway/tests/**/*.spec.ts'
              - 'e2e/**/*.spec.ts'

  quick-test-hygiene:
    name: Quick Test Hygiene
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: [detect-changes]
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run test hygiene checks on changed tests
        run: |
          if [ -z "${{ needs.detect-changes.outputs.test_files }}" ]; then
            echo "No changed test files."
            exit 0
          fi
          npm run test:hygiene -- ${{ needs.detect-changes.outputs.test_files }}

  quick-frontend-tests:
    name: Quick Frontend Tests
    if: github.event_name == 'pull_request' && needs.detect-changes.outputs.frontend_changed == 'true'
    runs-on: ubuntu-latest
    needs: [detect-changes]
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run strict app typecheck
        run: npm run typecheck:app

      - name: Run strict test typecheck
        run: npm run typecheck:tests

      - name: Run related frontend tests
        run: npx vitest related --run --passWithNoTests ${{ needs.detect-changes.outputs.frontend_files }}

  quick-backend-tests:
    name: Quick Backend Tests
    if: github.event_name == 'pull_request' && needs.detect-changes.outputs.backend_changed == 'true'
    runs-on: ubuntu-latest
    needs: [detect-changes]
    defaults:
      run:
        working-directory: server

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: sanctuary_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Link shared schema dependencies
        run: node scripts/ensure-shared-module-resolution.mjs

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/sanctuary_test?schema=public
        run: npx prisma migrate deploy

      - name: Run server test typecheck
        run: npm run typecheck:tests

      - name: Run related backend tests
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/sanctuary_test?schema=public
          JWT_SECRET: test-jwt-secret-for-ci-minimum-32-chars
          ENCRYPTION_KEY: test-encryption-key-32-chars-long!
          NODE_ENV: test
        run: npx vitest related --run --passWithNoTests --exclude "tests/integration/**" ${{ needs.detect-changes.outputs.backend_files }}

  quick-backend-integration-smoke:
    name: Quick Backend Integration Smoke
    if: github.event_name == 'pull_request' && needs.detect-changes.outputs.backend_changed == 'true'
    runs-on: ubuntu-latest
    needs: [detect-changes]
    defaults:
      run:
        working-directory: server

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: sanctuary_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Link shared schema dependencies
        run: node scripts/ensure-shared-module-resolution.mjs

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/sanctuary_test?schema=public
        run: npx prisma migrate deploy

      - name: Run integration smoke tests
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/sanctuary_test?schema=public
          JWT_SECRET: test-jwt-secret-for-ci-minimum-32-chars
          ENCRYPTION_KEY: test-encryption-key-32-chars-long!
          NODE_ENV: test
        run: >
          npx vitest run --no-file-parallelism --maxWorkers 1
          tests/integration/websocket/websocket.integration.test.ts
          tests/integration/flows/auth.integration.test.ts

  quick-critical-mutation:
    name: Quick Critical Mutation Gate
    if: github.event_name == 'pull_request' && needs.detect-changes.outputs.critical_mutation_changed == 'true'
    runs-on: ubuntu-latest
    needs: [detect-changes]
    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Link shared schema dependencies
        run: node scripts/ensure-shared-module-resolution.mjs

      - name: Run critical mutation gate
        run: npm run test:mutation:critical:gate

      - name: Upload critical mutation report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: critical-mutation-report-pr
          path: server/reports/mutation/
          retention-days: 14

  quick-gateway-tests:
    name: Quick Gateway Tests
    if: github.event_name == 'pull_request' && needs.detect-changes.outputs.gateway_changed == 'true'
    runs-on: ubuntu-latest
    needs: [detect-changes]
    defaults:
      run:
        working-directory: gateway

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: gateway/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run related gateway tests
        env:
          NODE_ENV: test
          JWT_SECRET: test-jwt-secret-for-ci-minimum-32-chars
        run: npx vitest related --run --passWithNoTests ${{ needs.detect-changes.outputs.gateway_files }}

  quick-e2e-smoke:
    name: Quick E2E Smoke
    if: github.event_name == 'pull_request' && (needs.detect-changes.outputs.e2e_changed == 'true' || needs.detect-changes.outputs.frontend_changed == 'true')
    runs-on: ubuntu-latest
    needs: [detect-changes]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: sanctuary_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        run: npm run build
        env:
          VITE_API_URL: http://localhost:3001

      - name: Setup backend
        working-directory: server
        run: |
          npm ci
          npx prisma generate
          npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/sanctuary_test?schema=public

      - name: Build backend
        working-directory: server
        run: npm run build

      - name: Start backend server
        working-directory: server
        run: npm run start &
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/sanctuary_test?schema=public
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-jwt-secret-for-ci-minimum-32-chars
          ENCRYPTION_KEY: test-encryption-key-32-chars-long!
          GATEWAY_SECRET: test-gateway-secret-for-ci-minimum-32-chars
          ENCRYPTION_SALT: test-encryption-salt-for-ci
          NODE_ENV: test
          PORT: 3001
          # E2E harness starts only the server, not the paired worker, so
          # disable the critical worker-heartbeat startup gate.
          WORKER_HEALTH_MONITOR_ENABLED: 'false'

      - name: Wait for backend to be ready
        run: |
          echo "Waiting for backend server..."
          for i in {1..30}; do
            if curl -s http://localhost:3001/health > /dev/null 2>&1; then
              echo "Backend is ready!"
              exit 0
            fi
            echo "Attempt $i: Backend not ready yet..."
            sleep 2
          done
          echo "Backend failed to start"
          exit 1

      - name: Run smoke E2E tests
        run: npm run test:e2e -- --project=chromium e2e/admin-drafts-smoke.spec.ts
        env:
          CI: 'true'
          DATABASE_URL: postgresql://test:test@localhost:5432/sanctuary_test?schema=public
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-jwt-secret-for-ci-minimum-32-chars
          ENCRYPTION_KEY: test-encryption-key-32-chars-long!
          NODE_ENV: test
          VITE_API_URL: http://localhost:3001

      - name: Run render regression E2E tests
        run: npm run test:e2e -- --project=chromium e2e/render-regression.spec.ts
        env:
          CI: 'true'
          DATABASE_URL: postgresql://test:test@localhost:5432/sanctuary_test?schema=public
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-jwt-secret-for-ci-minimum-32-chars
          ENCRYPTION_KEY: test-encryption-key-32-chars-long!
          NODE_ENV: test
          VITE_API_URL: http://localhost:3001

  pr-required-checks:
    name: PR Required Checks
    # Runs on pull_request and merge_group. On pull_request it aggregates
    # the quick lane; on merge_group it's a no-op (Full Test Summary is the
    # authoritative gate there), but it must still report a conclusion so
    # branch protection doesn't rely on GitHub's "skipped == success"
    # semantics for merge-queue eligibility.
    if: always() && (github.event_name == 'pull_request' || github.event_name == 'merge_group')
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - quick-test-hygiene
      - quick-frontend-tests
      - quick-backend-tests
      - quick-backend-integration-smoke
      - quick-critical-mutation
      - quick-gateway-tests
      - quick-e2e-smoke
    steps:
      - name: Merge group no-op
        if: github.event_name == 'merge_group'
        run: |
          echo "PR Required Checks aggregates the pull_request quick lane."
          echo "On merge_group events, Full Test Summary (full lane) is the authoritative gate."
          echo "Reporting success so branch-protection required-checks are explicitly satisfied."

      - name: Check PR quick lane results
        if: github.event_name == 'pull_request'
        env:
          DETECT_CHANGES: ${{ needs.detect-changes.result }}
          QUICK_TEST_HYGIENE: ${{ needs.quick-test-hygiene.result }}
          QUICK_FRONTEND_TESTS: ${{ needs.quick-frontend-tests.result }}
          QUICK_BACKEND_TESTS: ${{ needs.quick-backend-tests.result }}
          QUICK_BACKEND_INTEGRATION_SMOKE: ${{ needs.quick-backend-integration-smoke.result }}
          QUICK_CRITICAL_MUTATION: ${{ needs.quick-critical-mutation.result }}
          QUICK_GATEWAY_TESTS: ${{ needs.quick-gateway-tests.result }}
          QUICK_E2E_SMOKE: ${{ needs.quick-e2e-smoke.result }}
        run: |
          failed=false

          require_success() {
            name="$1"
            result="$2"
            if [ "$result" != "success" ]; then
              echo "::error::$name result was $result; expected success"
              failed=true
            else
              echo "$name: $result"
            fi
          }

          allow_success_or_skipped() {
            name="$1"
            result="$2"
            case "$result" in
              success|skipped)
                echo "$name: $result"
                ;;
              *)
                echo "::error::$name result was $result; expected success or skipped"
                failed=true
                ;;
            esac
          }

          require_success "Detect Changed Files" "$DETECT_CHANGES"
          allow_success_or_skipped "Quick Test Hygiene" "$QUICK_TEST_HYGIENE"
          allow_success_or_skipped "Quick Frontend Tests" "$QUICK_FRONTEND_TESTS"
          allow_success_or_skipped "Quick Backend Tests" "$QUICK_BACKEND_TESTS"
          allow_success_or_skipped "Quick Backend Integration Smoke" "$QUICK_BACKEND_INTEGRATION_SMOKE"
          allow_success_or_skipped "Quick Critical Mutation Gate" "$QUICK_CRITICAL_MUTATION"
          allow_success_or_skipped "Quick Gateway Tests" "$QUICK_GATEWAY_TESTS"
          allow_success_or_skipped "Quick E2E Smoke" "$QUICK_E2E_SMOKE"

          if [ "$failed" = "true" ]; then
            exit 1
          fi

  # ============================================
  # Full Lane (main/nightly/manual)
  # ============================================
  full-backend-tests:
    name: Full Backend Tests
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: sanctuary_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Link shared schema dependencies
        run: node scripts/ensure-shared-module-resolution.mjs

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/sanctuary_test?schema=public
        run: npx prisma migrate deploy

      - name: Run server test typecheck
        run: npm run typecheck:tests

      - name: Run unit tests with coverage
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/sanctuary_test?schema=public
          JWT_SECRET: test-jwt-secret-for-ci-minimum-32-chars
          ENCRYPTION_KEY: test-encryption-key-32-chars-long!
          NODE_ENV: test
        run: npm run test:unit -- --coverage

      - name: Run integration tests
        working-directory: ${{ github.workspace }}/server
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/sanctuary_test?schema=public
          JWT_SECRET: test-jwt-secret-for-ci-minimum-32-chars
          ENCRYPTION_KEY: test-encryption-key-32-chars-long!
          NODE_ENV: test
        run: npm run test:integration

      - name: Upload backend coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: backend-coverage
          path: |
            server/coverage/
            server/junit.xml
          retention-days: 14

  full-frontend-tests:
    name: Full Frontend Tests
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run strict app typecheck
        run: npm run typecheck:app

      - name: Run strict test typecheck
        run: npm run typecheck:tests

      - name: Run frontend coverage (threshold-enforced)
        run: npm run test:coverage

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: frontend-coverage
          path: coverage/
          retention-days: 14

  full-gateway-tests:
    name: Full Gateway Tests
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gateway

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: gateway/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run gateway coverage
        env:
          NODE_ENV: test
          JWT_SECRET: test-jwt-secret-for-ci-minimum-32-chars
        run: npm run test:coverage

      - name: Upload gateway coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: gateway-coverage
          path: gateway/coverage/
          retention-days: 14

  full-critical-mutation:
    name: Full Critical Mutation Gate
    if: always() && github.event_name != 'pull_request' && (github.event_name != 'push' || needs.detect-changes.outputs.critical_mutation_changed == 'true')
    runs-on: ubuntu-latest
    needs: [detect-changes]
    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Link shared schema dependencies
        run: node scripts/ensure-shared-module-resolution.mjs

      - name: Run critical mutation gate
        run: npm run test:mutation:critical:gate

      - name: Upload critical mutation report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: critical-mutation-report
          path: server/reports/mutation/
          retention-days: 14

  full-e2e-tests:
    name: Full E2E Tests
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: [full-backend-tests, full-frontend-tests, full-gateway-tests]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: sanctuary_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        run: npm run build
        env:
          VITE_API_URL: http://localhost:3001

      - name: Setup backend
        working-directory: server
        run: |
          npm ci
          npx prisma generate
          npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/sanctuary_test?schema=public

      - name: Build backend
        working-directory: server
        run: npm run build

      - name: Start backend server
        working-directory: server
        run: npm run start &
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/sanctuary_test?schema=public
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-jwt-secret-for-ci-minimum-32-chars
          ENCRYPTION_KEY: test-encryption-key-32-chars-long!
          GATEWAY_SECRET: test-gateway-secret-for-ci-minimum-32-chars
          ENCRYPTION_SALT: test-encryption-salt-for-ci
          NODE_ENV: test
          PORT: 3001
          # E2E harness starts only the server, not the paired worker, so
          # disable the critical worker-heartbeat startup gate.
          WORKER_HEALTH_MONITOR_ENABLED: 'false'

      - name: Wait for backend to be ready
        run: |
          echo "Waiting for backend server..."
          for i in {1..30}; do
            if curl -s http://localhost:3001/health > /dev/null 2>&1; then
              echo "Backend is ready!"
              exit 0
            fi
            echo "Attempt $i: Backend not ready yet..."
            sleep 2
          done
          echo "Backend failed to start"
          exit 1

      - name: Run E2E tests
        run: npm run test:e2e -- --project=chromium
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/sanctuary_test?schema=public
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-jwt-secret-for-ci-minimum-32-chars
          ENCRYPTION_KEY: test-encryption-key-32-chars-long!
          NODE_ENV: test
          VITE_API_URL: http://localhost:3001
          # Keep auth-dependent legacy specs skipped until seeded test auth users exist.
          SKIP_AUTH_TESTS: 'true'

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: playwright-results
          path: test-results/
          if-no-files-found: ignore
          retention-days: 14

  full-build-check:
    name: Full Build Check
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: [full-backend-tests, full-frontend-tests]

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build frontend
        run: |
          npm ci
          npm run build

      - name: Build backend
        working-directory: server
        run: |
          npm ci
          npx prisma generate
          npm run build

  full-test-summary:
    name: Full Test Summary
    if: always() && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: [full-backend-tests, full-frontend-tests, full-gateway-tests, full-critical-mutation, full-e2e-tests, full-build-check]

    steps:
      - name: Download backend coverage
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: backend-coverage
          path: backend-results/

      - name: Download frontend coverage
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: frontend-coverage
          path: frontend-results/

      - name: Download gateway coverage
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: gateway-coverage
          path: gateway-results/

      - name: Download critical mutation report
        if: needs.full-critical-mutation.result == 'success' || needs.full-critical-mutation.result == 'failure'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: critical-mutation-report
          path: mutation-results/

      - name: Generate summary
        run: |
          echo "## Full Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.full-backend-tests.result }}" = "success" ]; then
            echo "### Backend: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "### Backend: Failed" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f backend-results/coverage/coverage-summary.json ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "#### Backend Coverage" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Coverage |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|----------|" >> $GITHUB_STEP_SUMMARY
            jq -r '.total | to_entries[] | "| \(.key) | \(.value.pct)% |"' backend-results/coverage/coverage-summary.json >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.full-frontend-tests.result }}" = "success" ]; then
            echo "### Frontend: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "### Frontend: Failed" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f frontend-results/coverage-summary.json ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "#### Frontend Coverage" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Coverage |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|----------|" >> $GITHUB_STEP_SUMMARY
            jq -r '.total | to_entries[] | "| \(.key) | \(.value.pct)% |"' frontend-results/coverage-summary.json >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.full-gateway-tests.result }}" = "success" ]; then
            echo "### Gateway: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "### Gateway: Failed" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f gateway-results/coverage/coverage-summary.json ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "#### Gateway Coverage" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Coverage |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|----------|" >> $GITHUB_STEP_SUMMARY
            jq -r '.total | to_entries[] | "| \(.key) | \(.value.pct)% |"' gateway-results/coverage/coverage-summary.json >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.full-build-check.result }}" = "success" ]; then
            echo "### Build Check: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "### Build Check: Failed" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.full-e2e-tests.result }}" = "success" ]; then
            echo "### E2E: Passed" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.full-e2e-tests.result }}" = "skipped" ]; then
            echo "### E2E: Skipped" >> $GITHUB_STEP_SUMMARY
          else
            echo "### E2E: Failed" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.full-critical-mutation.result }}" = "success" ]; then
            echo "### Critical Mutation Gate: Passed" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.full-critical-mutation.result }}" = "skipped" ]; then
            echo "### Critical Mutation Gate: Skipped" >> $GITHUB_STEP_SUMMARY
            echo "No critical mutation paths changed on this push." >> $GITHUB_STEP_SUMMARY
          else
            echo "### Critical Mutation Gate: Failed" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check full lane result
        env:
          FULL_BACKEND_TESTS: ${{ needs.full-backend-tests.result }}
          FULL_FRONTEND_TESTS: ${{ needs.full-frontend-tests.result }}
          FULL_GATEWAY_TESTS: ${{ needs.full-gateway-tests.result }}
          FULL_CRITICAL_MUTATION: ${{ needs.full-critical-mutation.result }}
          FULL_E2E_TESTS: ${{ needs.full-e2e-tests.result }}
          FULL_BUILD_CHECK: ${{ needs.full-build-check.result }}
        run: |
          failed=false

          require_success() {
            name="$1"
            result="$2"
            if [ "$result" != "success" ]; then
              echo "::error::$name result was $result; expected success"
              failed=true
            else
              echo "$name: $result"
            fi
          }

          allow_success_or_skipped() {
            name="$1"
            result="$2"
            case "$result" in
              success|skipped)
                echo "$name: $result"
                ;;
              *)
                echo "::error::$name result was $result; expected success or skipped"
                failed=true
                ;;
            esac
          }

          require_success "Full Backend Tests" "$FULL_BACKEND_TESTS"
          require_success "Full Frontend Tests" "$FULL_FRONTEND_TESTS"
          require_success "Full Gateway Tests" "$FULL_GATEWAY_TESTS"
          require_success "Full E2E Tests" "$FULL_E2E_TESTS"
          require_success "Full Build Check" "$FULL_BUILD_CHECK"
          allow_success_or_skipped "Full Critical Mutation Gate" "$FULL_CRITICAL_MUTATION"

          if [ "$failed" = "true" ]; then
            exit 1
          fi
