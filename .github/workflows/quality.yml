name: Code Quality

# Universal quality signals that aren't covered by the main test workflow:
# - lint:     repo-owned TypeScript policy gate for production source
# - gitleaks: secret scanning (layered over .gitleaks.toml allowlist)
# - lizard:   cyclomatic complexity (McCabe, NIST SP 500-235 thresholds)
# - jscpd:    duplicate-block detection (SonarQube 3% default)
#
# The lint job is blocking. The other three jobs are nonblocking
# (continue-on-error) during the initial rollout while we tune baselines.
# Promote those checks to required once the signal is stable. Scheduled
# weekly so baseline drift is visible even on quiet weeks; runs on every
# PR for per-change feedback.

on:
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 8 * * 1' # Monday 08:00 UTC
  workflow_dispatch:

env:
  NODE_VERSION: '22'
  PYTHON_VERSION: '3.12'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          config-path: .gitleaks.toml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lizard:
    name: Cyclomatic complexity (lizard)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install lizard
        run: python -m pip install --upgrade pip lizard

      - name: Run lizard
        # McCabe / NIST / SonarQube: warn on CCN > 15, error on avg CCN > 15.
        # -l filters by language; `-x` excludes generated, vendored, and
        # test-fixture paths that skew the signal.
        run: |
          lizard \
            -l javascript \
            -l typescript \
            -C 15 \
            -T nloc=200 \
            -x './node_modules/*' \
            -x './*/node_modules/*' \
            -x './dist/*' \
            -x './*/dist/*' \
            -x './build/*' \
            -x './coverage/*' \
            -x './*/coverage/*' \
            -x './server/src/generated/*' \
            -x './server/tests/fixtures/*' \
            -x './scripts/verify-addresses/output/*' \
            -x './*.min.js' \
            -x './reports/*' \
            -x './playwright-report/*' \
            -x './test-results/*' \
            .

  jscpd:
    name: Duplication (jscpd)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run jscpd
        # Uses .jscpd.json at the repo root. Config owns threshold and
        # exclusions. Installing via npx keeps the repo devDependencies
        # lean; pin to a known-good major version to avoid drift.
        run: npx --yes jscpd@4 .

      - name: Upload jscpd report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jscpd-report
          path: reports/jscpd/
          if-no-files-found: ignore
