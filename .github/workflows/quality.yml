name: Code Quality

# Universal quality signals that aren't covered by the main test workflow:
# - lint:     repo-owned TypeScript policy gate for production source
# - gitleaks: secret scanning (layered over .gitleaks.toml allowlist)
# - lizard:   cyclomatic complexity (McCabe, NIST SP 500-235 thresholds)
# - jscpd:    duplicate-block detection (SonarQube 3% default)
#
# These jobs are blocking. gitleaks gates new commit ranges instead of
# historical repository cleanup, while lizard enforces the current warning
# baseline until the existing complexity hot spots are refactored. Scheduled
# weekly so baseline drift is visible even on quiet weeks; runs on every PR
# for per-change feedback.

on:
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 8 * * 1' # Monday 08:00 UTC
  workflow_dispatch:

env:
  NODE_VERSION: '22'
  PYTHON_VERSION: '3.12'
  GITLEAKS_VERSION: '8.30.1'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSL \
            -o /tmp/gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          /tmp/gitleaks version

      - name: Run gitleaks
        # The repository has older test-fixture/history false positives, so
        # this job gates new PR commits and the latest scheduled/dispatch
        # commit instead of forcing an unrelated full-history cleanup.
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            /tmp/gitleaks git . \
              --config .gitleaks.toml \
              --redact \
              --no-banner \
              --log-opts "--no-merges --first-parent ${BASE_SHA}^..${HEAD_SHA}"
          else
            /tmp/gitleaks git . \
              --config .gitleaks.toml \
              --redact \
              --no-banner \
              --log-opts -1
          fi

  lizard:
    name: Cyclomatic complexity (lizard)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install lizard
        run: python -m pip install --upgrade pip lizard

      - name: Run lizard
        # McCabe / NIST / SonarQube: warn on CCN > 15. The current measured
        # baseline is 38 warnings; fail the job if the count grows.
        # -l filters by language; `-x` excludes generated, vendored, and
        # test-fixture paths that skew the signal.
        run: |
          lizard \
            -w \
            -i 38 \
            -l javascript \
            -l typescript \
            -C 15 \
            -T nloc=200 \
            -x './node_modules/*' \
            -x './*/node_modules/*' \
            -x './dist/*' \
            -x './*/dist/*' \
            -x './build/*' \
            -x './coverage/*' \
            -x './*/coverage/*' \
            -x './server/src/generated/*' \
            -x './server/tests/fixtures/*' \
            -x './scripts/verify-addresses/output/*' \
            -x './*.min.js' \
            -x './reports/*' \
            -x './playwright-report/*' \
            -x './test-results/*' \
            -x './.tmp/*' \
            -x './.tmp-gh/*' \
            .

  jscpd:
    name: Duplication (jscpd)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run jscpd
        # Uses .jscpd.json at the repo root. Config owns threshold and
        # exclusions. Installing via npx keeps the repo devDependencies
        # lean; pin to a known-good major version to avoid drift.
        run: npx --yes jscpd@4 .

      - name: Upload jscpd report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jscpd-report
          path: reports/jscpd/
          if-no-files-found: ignore
