name: Code Quality

# Universal quality signals that aren't covered by the main test workflow:
# - lint:     repo-owned TypeScript policy gate for production source
# - gitleaks: secret scanning (layered over .gitleaks.toml allowlist)
# - actionlint: GitHub Actions workflow syntax/expression validation
# - lizard:   cyclomatic complexity (McCabe, NIST SP 500-235 thresholds)
# - jscpd:    duplicate-block detection (SonarQube 3% default)
#
# These jobs are blocking. gitleaks gates new commit ranges plus the tracked
# tree, while lizard enforces a zero-warning baseline. Scheduled
# weekly so baseline drift is visible even on quiet weeks; runs on every PR
# for per-change feedback.

on:
  pull_request:
    branches:
      - main
  merge_group:
    types:
      - checks_requested
  schedule:
    - cron: '0 8 * * 1' # Monday 08:00 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || github.event_name == 'merge_group' }}

env:
  NODE_VERSION: '24'
  PYTHON_VERSION: '3.12'
  GITLEAKS_VERSION: '8.30.1'
  ACTIONLINT_VERSION: '1.7.12'
  ACTIONLINT_LINUX_AMD64_SHA256: '8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8'
  LIZARD_WARNING_BASELINE: '9'

jobs:
  determine-scope:
    name: Determine Quality Scope
    runs-on: ubuntu-latest
    outputs:
      run_repo_quality: ${{ steps.classify.outputs.run_repo_quality }}
      run_workflow_quality: ${{ steps.classify.outputs.run_workflow_quality }}
      run_ci_classifier_tests: ${{ steps.classify.outputs.run_ci_classifier_tests }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Classify quality scope
        id: classify
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          MERGE_GROUP_BASE_SHA: ${{ github.event.merge_group.base_sha }}
          MERGE_GROUP_HEAD_SHA: ${{ github.event.merge_group.head_sha }}
          WORKFLOW_SHA: ${{ github.sha }}
        run: bash scripts/ci/classify-quality-scope.sh

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: [determine-scope]
    if: needs.determine-scope.outputs.run_repo_quality == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    needs: [determine-scope]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSL \
            -o /tmp/gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          /tmp/gitleaks version

      - name: Run gitleaks
        # The repository has older test-fixture/history false positives, so
        # this job gates new PR commits and the latest scheduled/dispatch
        # commit. The tracked-tree scan covers the full checked-out source
        # while excluding ignored local artifacts such as .env, coverage,
        # dist, and generated SSL keys.
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            /tmp/gitleaks git . \
              --config .gitleaks.toml \
              --redact \
              --no-banner \
              --log-opts "--no-merges --first-parent ${BASE_SHA}^..${HEAD_SHA}"
          else
            /tmp/gitleaks git . \
              --config .gitleaks.toml \
              --redact \
              --no-banner \
              --log-opts -1
          fi
          export GITLEAKS_BIN=/tmp/gitleaks
          bash scripts/gitleaks-tracked-tree.sh

  workflow-lint:
    name: Workflow lint (actionlint)
    runs-on: ubuntu-latest
    needs: [determine-scope]
    if: needs.determine-scope.outputs.run_workflow_quality == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install actionlint
        run: |
          curl -sSL \
            -o /tmp/actionlint.tar.gz \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          printf '%s  /tmp/actionlint.tar.gz\n' "${ACTIONLINT_LINUX_AMD64_SHA256}" > /tmp/actionlint.sha256
          sha256sum -c /tmp/actionlint.sha256
          tar -xzf /tmp/actionlint.tar.gz -C /tmp actionlint
          /tmp/actionlint -version

      - name: Run actionlint
        run: /tmp/actionlint -color -shellcheck=

  ci-classifier-tests:
    name: CI classifier tests
    runs-on: ubuntu-latest
    needs: [determine-scope]
    if: needs.determine-scope.outputs.run_ci_classifier_tests == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Run CI classifier tests
        run: |
          bash -n scripts/ci/classify-test-changes.sh
          bash -n scripts/ci/classify-docker-build-images.sh
          bash -n scripts/ci/classify-codeql-languages.sh
          bash -n scripts/ci/classify-quality-scope.sh
          bash -n scripts/ci/browser-e2e-groups.sh
          bash -n scripts/ci/backend-integration-groups.sh
          bash -n scripts/ci/frontend-coverage-shard.sh
          bash -n scripts/ci/frontend-coverage-merge.sh
          bash -n scripts/ci/time-command.sh
          bash -n scripts/ci/report-workflow-durations.sh
          bash -n scripts/ci/report-workflow-trends.sh
          bash -n tests/ci/playwright-timing-reporter.test.sh
          bash -n tests/ci/classify-test-changes.test.sh
          bash -n tests/ci/classify-docker-build-images.test.sh
          bash -n tests/ci/classify-codeql-languages.test.sh
          bash -n tests/ci/classify-quality-scope.test.sh
          bash -n tests/ci/browser-e2e-groups.test.sh
          bash -n tests/ci/backend-integration-groups.test.sh
          bash -n tests/ci/frontend-coverage-scripts.test.sh
          bash -n tests/ci/report-workflow-trends.test.sh
          bash tests/ci/playwright-timing-reporter.test.sh
          bash tests/ci/classify-test-changes.test.sh
          bash tests/ci/classify-docker-build-images.test.sh
          bash tests/ci/classify-codeql-languages.test.sh
          bash tests/ci/classify-quality-scope.test.sh
          bash tests/ci/browser-e2e-groups.test.sh
          bash tests/ci/backend-integration-groups.test.sh
          bash tests/ci/frontend-coverage-scripts.test.sh
          bash tests/ci/report-workflow-trends.test.sh

  lizard:
    name: Cyclomatic complexity (lizard)
    runs-on: ubuntu-latest
    needs: [determine-scope]
    if: needs.determine-scope.outputs.run_repo_quality == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install lizard
        run: |
          python -m pip install --upgrade pip
          python -m pip install --requirement scripts/quality/lizard-requirements.txt

      - name: Run lizard
        # McCabe / NIST / SonarQube: warn on CCN > 15. The current measured
        # CI-scope baseline is 9 warnings; fail the job if that count grows.
        # -l filters by language; `-x` excludes generated, vendored, and
        # test-fixture paths that skew the signal.
        run: |
          lizard \
            -w \
            -i "${LIZARD_WARNING_BASELINE}" \
            -l javascript \
            -l typescript \
            -C 15 \
            -T nloc=200 \
            -x './node_modules/*' \
            -x './*/node_modules/*' \
            -x './dist/*' \
            -x './*/dist/*' \
            -x './build/*' \
            -x './coverage/*' \
            -x './*/coverage/*' \
            -x './server/src/generated/*' \
            -x './server/tests/fixtures/*' \
            -x './scripts/verify-addresses/output/*' \
            -x './*.min.js' \
            -x './reports/*' \
            -x './playwright-report/*' \
            -x './test-results/*' \
            -x './.tmp/*' \
            -x './.tmp-gh/*' \
            .

  jscpd:
    name: Duplication (jscpd)
    runs-on: ubuntu-latest
    needs: [determine-scope]
    if: needs.determine-scope.outputs.run_repo_quality == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run jscpd
        # Uses .jscpd.json at the repo root. Config owns threshold and
        # exclusions. Installing via npx keeps the repo devDependencies
        # lean; pin to a known-good major version to avoid drift.
        run: npx --yes jscpd@4 .

      - name: Upload jscpd report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: jscpd-report
          path: reports/jscpd/
          if-no-files-found: ignore

  quality-required-checks:
    name: Code Quality Required Checks
    runs-on: ubuntu-latest
    if: always()
    needs: [determine-scope, lint, gitleaks, workflow-lint, ci-classifier-tests, lizard, jscpd]
    steps:
      - name: Check quality job results
        env:
          RUN_REPO_QUALITY: ${{ needs.determine-scope.outputs.run_repo_quality }}
          RUN_WORKFLOW_QUALITY: ${{ needs.determine-scope.outputs.run_workflow_quality }}
          RUN_CI_CLASSIFIER_TESTS: ${{ needs.determine-scope.outputs.run_ci_classifier_tests }}
          LINT: ${{ needs.lint.result }}
          GITLEAKS: ${{ needs.gitleaks.result }}
          WORKFLOW_LINT: ${{ needs.workflow-lint.result }}
          CI_CLASSIFIER_TESTS: ${{ needs.ci-classifier-tests.result }}
          LIZARD: ${{ needs.lizard.result }}
          JSCPD: ${{ needs.jscpd.result }}
        run: |
          failed=false

          require_success() {
            name="$1"
            result="$2"
            if [ "$result" != "success" ]; then
              echo "::error::$name result was $result; expected success"
              failed=true
            else
              echo "$name: $result"
            fi
          }

          require_success "Secret scan (gitleaks)" "$GITLEAKS"

          allow_success_or_skipped() {
            name="$1"
            result="$2"
            if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
              echo "::error::$name result was $result; expected success or skipped"
              failed=true
            else
              echo "$name: $result"
            fi
          }

          if [ "$RUN_REPO_QUALITY" = "true" ]; then
            require_success "Lint" "$LINT"
            require_success "Cyclomatic complexity (lizard)" "$LIZARD"
            require_success "Duplication (jscpd)" "$JSCPD"
          else
            allow_success_or_skipped "Lint" "$LINT"
            allow_success_or_skipped "Cyclomatic complexity (lizard)" "$LIZARD"
            allow_success_or_skipped "Duplication (jscpd)" "$JSCPD"
          fi

          if [ "$RUN_WORKFLOW_QUALITY" = "true" ]; then
            require_success "Workflow lint (actionlint)" "$WORKFLOW_LINT"
          else
            allow_success_or_skipped "Workflow lint (actionlint)" "$WORKFLOW_LINT"
          fi

          if [ "$RUN_CI_CLASSIFIER_TESTS" = "true" ]; then
            require_success "CI classifier tests" "$CI_CLASSIFIER_TESTS"
          else
            allow_success_or_skipped "CI classifier tests" "$CI_CLASSIFIER_TESTS"
          fi

          if [ "$failed" = "true" ]; then
            exit 1
          fi
