name: Architecture

on:
  pull_request:
    paths:
      - '**/*.ts'
      - '**/*.tsx'
      - '**/ARCHITECTURE.md'
      - 'docs/**'
      - 'CONTRIBUTING.md'
      - '.dependency-cruiser.cjs'
      - 'server/.dependency-cruiser.cjs'
      - 'gateway/.dependency-cruiser.cjs'
      - 'scripts/architecture/**'
      - 'website/**'
      - '.github/workflows/architecture.yml'
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '24'

jobs:
  build:
    name: Lint diagrams, regenerate graphs, build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies (root, server, gateway, website in parallel)
        # Bare `wait` returns 0 even when background jobs fail. Capture each
        # PID and wait on it explicitly so any install failure surfaces.
        run: |
          set -uo pipefail
          npm ci > /tmp/npm-root.log 2>&1 & pid_root=$!
          (cd server && npm ci) > /tmp/npm-server.log 2>&1 & pid_server=$!
          (cd gateway && npm ci) > /tmp/npm-gateway.log 2>&1 & pid_gateway=$!
          (cd website && npm ci) > /tmp/npm-website.log 2>&1 & pid_website=$!
          fail=0
          wait "$pid_root"    || { echo "::group::root npm ci failed";    cat /tmp/npm-root.log;    echo "::endgroup::"; fail=1; }
          wait "$pid_server"  || { echo "::group::server npm ci failed";  cat /tmp/npm-server.log;  echo "::endgroup::"; fail=1; }
          wait "$pid_gateway" || { echo "::group::gateway npm ci failed"; cat /tmp/npm-gateway.log; echo "::endgroup::"; fail=1; }
          wait "$pid_website" || { echo "::group::website npm ci failed"; cat /tmp/npm-website.log; echo "::endgroup::"; fail=1; }
          if [ "$fail" -eq 0 ]; then
            echo "::group::root npm ci log";    cat /tmp/npm-root.log;    echo "::endgroup::"
            echo "::group::server npm ci log";  cat /tmp/npm-server.log;  echo "::endgroup::"
            echo "::group::gateway npm ci log"; cat /tmp/npm-gateway.log; echo "::endgroup::"
            echo "::group::website npm ci log"; cat /tmp/npm-website.log; echo "::endgroup::"
          fi
          exit "$fail"

      - name: Lint diagram click hrefs
        run: npm run arch:lint

      - name: Regenerate dependency graphs
        run: npm run arch:graphs

      - name: Regenerate function-level call graphs
        run: npm run arch:calls

      - name: Detect stale generated graphs
        run: |
          if ! git diff --exit-code -- docs/architecture/generated; then
            echo "::error::Generated architecture graphs are stale. Run 'npm run arch:graphs && npm run arch:calls' locally and commit the result."
            exit 1
          fi

      - name: Build Docusaurus site
        run: npm run docs:build

      - name: Upload site artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa
        with:
          path: website/build

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e
