name: Release

on:
  release:
    types: [published]  # Triggers when release is published
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.4.2)'
        required: true
        type: string
      include_full_upgrade_recovery:
        description: 'Run one full-mode baseline upgrade recovery lane during release-candidate validation'
        required: false
        default: false
        type: boolean
  push:
    tags:
      # Trigger for stable version tags (created by create-release.yml)
      # This handles the case where create-release.yml creates a pre-release
      # but can't trigger release.yml (GITHUB_TOKEN events don't cascade)
      - 'v[0-9]+.[0-9]+.[0-9]+'
    branches:
      - main

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # This job runs on push to main branch to provide a successful status check
  check:
    name: Release Check
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref_type == 'branch'
    steps:
      - name: Skip
        run: echo "Release workflow skipped for push events to branches"

  # Determine the version and commit SHA for tag pushes
  resolve-tag:
    name: Resolve Tag Info
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref_type == 'tag'
    outputs:
      version: ${{ steps.info.outputs.version }}
      sha: ${{ steps.info.outputs.sha }}
      is_stable: ${{ steps.info.outputs.is_stable }}
    steps:
      - name: Get tag info
        id: info
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "sha=${{ github.sha }}" >> $GITHUB_OUTPUT

          # Check if this is a stable version (no -rc, -alpha, -beta suffix)
          if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "is_stable=true" >> $GITHUB_OUTPUT
            echo "✓ Stable version: $VERSION"
          else
            echo "is_stable=false" >> $GITHUB_OUTPUT
            echo "⏭ Pre-release version: $VERSION - skipping release workflow"
          fi

  # ============================================
  # Ensure Release is a Pre-release (Release Candidate)
  # ============================================
  verify-prerelease:
    name: Verify Pre-release
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      contents: write
    steps:
      - name: Ensure release is a pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          IS_PRERELEASE="${{ github.event.release.prerelease }}"
          VERSION="${{ github.event.release.tag_name }}"

          if [ "$IS_PRERELEASE" != "true" ]; then
            echo "::warning::Release $VERSION was published as a full release. Converting to pre-release..."
            echo ""
            echo "Releases must pass validation before becoming full releases."
            echo "Converting to pre-release now..."

            # Convert to pre-release
            gh release edit "$VERSION" --prerelease

            echo ""
            echo "✓ Converted $VERSION to pre-release (release candidate)"
            echo "  It will be converted back to a full release after validation passes."
          else
            echo "✓ Release $VERSION is already a pre-release (release candidate)"
            echo "  It will be converted to a full release after validation passes."
          fi

  # ============================================
  # Wait for Install Tests to Pass
  # ============================================
  wait-for-install-tests:
    name: Wait for Install Tests
    runs-on: ubuntu-latest
    needs: [verify-prerelease, resolve-tag]
    if: |
      always() &&
      (
        (github.event_name == 'release' && needs.verify-prerelease.result == 'success') ||
        (github.event_name == 'workflow_dispatch') ||
        (github.event_name == 'push' && github.ref_type == 'tag' && needs.resolve-tag.outputs.is_stable == 'true')
      )
    permissions:
      checks: read
      contents: read
    outputs:
      sha: ${{ steps.resolve-sha.outputs.sha }}
      version: ${{ steps.resolve-sha.outputs.version }}
    steps:
      - name: Resolve commit SHA
        id: resolve-sha
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Determine the correct SHA and version based on trigger type
          if [ "${{ github.event_name }}" = "release" ]; then
            SHA="${{ github.sha }}"
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"
          elif [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref_type }}" = "tag" ]; then
            SHA="${{ github.sha }}"
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            # workflow_dispatch - resolve SHA from version tag
            VERSION="${{ inputs.version }}"
            SHA=$(gh api repos/${{ github.repository }}/git/ref/tags/v${VERSION} --jq '.object.sha' 2>/dev/null || echo "")
            if [ -z "$SHA" ]; then
              echo "::error::Could not find tag v${VERSION}"
              exit 1
            fi
            # If it's an annotated tag, get the commit it points to
            OBJ_TYPE=$(gh api repos/${{ github.repository }}/git/tags/${SHA} --jq '.object.type' 2>/dev/null || echo "commit")
            if [ "$OBJ_TYPE" = "commit" ]; then
              SHA=$(gh api repos/${{ github.repository }}/git/tags/${SHA} --jq '.object.sha' 2>/dev/null || echo "$SHA")
            fi
          fi

          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Resolved: version=$VERSION, sha=$SHA"

      - name: Wait for Install Tests workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Pin the poller to the specific Install Tests workflow run for THIS tag push.
          # The prior implementation queried /commits/<sha>/check-runs by name, which
          # accepted the RC tag's older successful summary as proof the stable tag passed
          # (both tags share one SHA). See v0.8.40 post-mortem.
          SHA="${{ steps.resolve-sha.outputs.sha }}"
          TAG_REF="v${{ steps.resolve-sha.outputs.version }}"
          MAX_ATTEMPTS=60  # 30 minutes at 30-second intervals
          ATTEMPT=0
          RUN_ID=""

          echo "Waiting for Install Tests run on $TAG_REF@$SHA..."

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))

            if [ -z "$RUN_ID" ]; then
              RUN_ID=$(gh api "repos/${{ github.repository }}/actions/workflows/install-test.yml/runs?head_sha=${SHA}&event=push&per_page=20" \
                --jq "[.workflow_runs[] | select(.head_branch == \"$TAG_REF\")] | .[0].id // empty" 2>/dev/null || echo "")
              if [ -z "$RUN_ID" ]; then
                echo "[$ATTEMPT/$MAX_ATTEMPTS] No Install Tests run registered for $TAG_REF yet, waiting..."
                sleep 30
                continue
              fi
              echo "Tracking run: https://github.com/${{ github.repository }}/actions/runs/$RUN_ID"
            fi

            RESULT=$(gh api "repos/${{ github.repository }}/actions/runs/${RUN_ID}" \
              --jq '{status: .status, conclusion: .conclusion}' 2>/dev/null || echo "{}")
            STATUS=$(echo "$RESULT" | jq -r '.status // "unknown"')
            CONCLUSION=$(echo "$RESULT" | jq -r '.conclusion // "null"')

            if [ "$STATUS" == "completed" ]; then
              if [ "$CONCLUSION" == "success" ]; then
                echo "✓ Install tests passed (run $RUN_ID)"
                exit 0
              fi
              echo "::error::Install tests finished with conclusion: $CONCLUSION (run $RUN_ID)"
              exit 1
            fi

            echo "[$ATTEMPT/$MAX_ATTEMPTS] Install Tests run status: $STATUS"
            sleep 30
          done

          echo "::error::Timed out waiting for Install Tests after 30 minutes"
          exit 1

  # ============================================
  # Run Release Candidate Validation
  # ============================================
  release-candidate:
    name: Release Candidate
    needs: wait-for-install-tests
    if: |
      always() && needs.wait-for-install-tests.result == 'success' &&
      (github.event_name == 'release' || github.event_name == 'workflow_dispatch' ||
       (github.event_name == 'push' && github.ref_type == 'tag'))
    uses: ./.github/workflows/release-candidate.yml
    with:
      ref: ${{ needs.wait-for-install-tests.outputs.sha }}
      version: ${{ needs.wait-for-install-tests.outputs.version }}
      include_full_upgrade_recovery: ${{ github.event.inputs.include_full_upgrade_recovery == 'true' }}

  # ============================================
  # Build Docker Images (per-architecture)
  # ============================================
  build-images:
    name: Build ${{ matrix.image }} (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    needs: [release-candidate, wait-for-install-tests]
    if: |
      always() && needs.release-candidate.result == 'success' &&
      (github.event_name == 'release' || github.event_name == 'workflow_dispatch' ||
       (github.event_name == 'push' && github.ref_type == 'tag'))
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Frontend builds
          - image: frontend
            platform: linux/amd64
            runner: ubuntu-latest
            dockerfile: ./Dockerfile
          - image: frontend
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            dockerfile: ./Dockerfile
          # Backend builds
          - image: backend
            platform: linux/amd64
            runner: ubuntu-latest
            dockerfile: ./server/Dockerfile
          - image: backend
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            dockerfile: ./server/Dockerfile
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ needs.wait-for-install-tests.outputs.sha }}

      - name: Generate platform-specific README
        run: |
          chmod +x scripts/generate-readme.sh
          ./scripts/generate-readme.sh github

      - name: Get version
        id: version
        run: |
          VERSION="${{ needs.wait-for-install-tests.outputs.version }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Log in to Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract platform suffix
        id: platform
        run: |
          PLATFORM="${{ matrix.platform }}"
          echo "suffix=${PLATFORM//\//-}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.image }}:v${{ steps.version.outputs.version }}-${{ steps.platform.outputs.suffix }}
          cache-from: type=gha,scope=${{ matrix.image }}-${{ steps.platform.outputs.suffix }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}-${{ steps.platform.outputs.suffix }}
          provenance: false

  # ============================================
  # Create Multi-Arch Manifests
  # ============================================
  create-manifests:
    name: Create Multi-Arch Manifests
    runs-on: ubuntu-latest
    needs: build-images
    if: |
      always() && needs.build-images.result == 'success' &&
      (github.event_name == 'release' || github.event_name == 'workflow_dispatch' ||
       (github.event_name == 'push' && github.ref_type == 'tag'))
    permissions:
      contents: write
      packages: write
    outputs:
      version: ${{ needs.build-images.outputs.version }}
      frontend_digest: ${{ steps.frontend.outputs.digest }}
      backend_digest: ${{ steps.backend.outputs.digest }}

    steps:
      - name: Log in to Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create frontend manifest
        id: frontend
        run: |
          VERSION="${{ needs.build-images.outputs.version }}"
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend"

          docker manifest create ${IMAGE}:v${VERSION} \
            ${IMAGE}:v${VERSION}-linux-amd64 \
            ${IMAGE}:v${VERSION}-linux-arm64

          docker manifest push ${IMAGE}:v${VERSION}

          # Only update :latest tag for stable releases (not -rc, -alpha, -beta)
          if [[ "$VERSION" != *-rc* && "$VERSION" != *-alpha* && "$VERSION" != *-beta* ]]; then
            docker manifest create ${IMAGE}:latest \
              ${IMAGE}:v${VERSION}-linux-amd64 \
              ${IMAGE}:v${VERSION}-linux-arm64
            docker manifest push ${IMAGE}:latest
            echo "✓ Updated :latest tag for frontend"
          else
            echo "⏭ Skipping :latest tag update for pre-release version"
          fi

          # Get digest from the pushed manifest (use docker buildx imagetools for proper digest)
          DIGEST=$(docker buildx imagetools inspect ${IMAGE}:v${VERSION} --format '{{json .Manifest.Digest}}' | tr -d '"')
          echo "digest=${DIGEST}" >> $GITHUB_OUTPUT

      - name: Create backend manifest
        id: backend
        run: |
          VERSION="${{ needs.build-images.outputs.version }}"
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend"

          docker manifest create ${IMAGE}:v${VERSION} \
            ${IMAGE}:v${VERSION}-linux-amd64 \
            ${IMAGE}:v${VERSION}-linux-arm64

          docker manifest push ${IMAGE}:v${VERSION}

          # Only update :latest tag for stable releases (not -rc, -alpha, -beta)
          if [[ "$VERSION" != *-rc* && "$VERSION" != *-alpha* && "$VERSION" != *-beta* ]]; then
            docker manifest create ${IMAGE}:latest \
              ${IMAGE}:v${VERSION}-linux-amd64 \
              ${IMAGE}:v${VERSION}-linux-arm64
            docker manifest push ${IMAGE}:latest
            echo "✓ Updated :latest tag for backend"
          else
            echo "⏭ Skipping :latest tag update for pre-release version"
          fi

          # Get digest from the pushed manifest
          DIGEST=$(docker buildx imagetools inspect ${IMAGE}:v${VERSION} --format '{{json .Manifest.Digest}}' | tr -d '"')
          echo "digest=${DIGEST}" >> $GITHUB_OUTPUT

  notify-umbrel-repo:
    name: Notify Umbrel Repo
    needs: create-manifests
    runs-on: ubuntu-latest
    if: |
      always() && needs.create-manifests.result == 'success' &&
      (github.event_name == 'release' || github.event_name == 'workflow_dispatch' ||
       (github.event_name == 'push' && github.ref_type == 'tag'))
    steps:
      - name: Check if stable release
        id: check-stable
        run: |
          VERSION="${{ needs.create-manifests.outputs.version }}"
          if [[ "$VERSION" == *-rc* || "$VERSION" == *-alpha* || "$VERSION" == *-beta* ]]; then
            echo "is_stable=false" >> $GITHUB_OUTPUT
            echo "⏭ Skipping sanctuary-umbrel notification for pre-release version: $VERSION"
          else
            echo "is_stable=true" >> $GITHUB_OUTPUT
          fi

      - name: Send image-published dispatch to sanctuary-umbrel
        if: steps.check-stable.outputs.is_stable == 'true'
        env:
          GH_TOKEN: ${{ secrets.UMBREL_DISPATCH_TOKEN }}
          VERSION: ${{ needs.create-manifests.outputs.version }}
          FRONTEND_DIGEST: ${{ needs.create-manifests.outputs.frontend_digest }}
          BACKEND_DIGEST: ${{ needs.create-manifests.outputs.backend_digest }}
        run: |
          gh api -X POST /repos/nekoguntai-castle/sanctuary-umbrel/dispatches \
            -f event_type=image-published \
            -f "client_payload[version]=$VERSION" \
            -f "client_payload[frontend_digest]=$FRONTEND_DIGEST" \
            -f "client_payload[backend_digest]=$BACKEND_DIGEST"
          echo "✓ Dispatched image-published event to sanctuary-umbrel for v$VERSION"

  update-release:
    name: Update Release Notes
    needs: create-manifests
    runs-on: ubuntu-latest
    if: |
      always() && needs.create-manifests.result == 'success' &&
      (github.event_name == 'release' || github.event_name == 'workflow_dispatch' ||
       (github.event_name == 'push' && github.ref_type == 'tag'))
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Update release notes with install instructions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.create-manifests.outputs.version }}
        run: |
          # Get release ID - either from event or by looking up the tag
          if [ "${{ github.event_name }}" = "release" ]; then
            RELEASE_ID="${{ github.event.release.id }}"
          else
            RELEASE_ID=$(gh api repos/${{ github.repository }}/releases/tags/v${VERSION} --jq '.id' 2>/dev/null || echo "")
            if [ -z "$RELEASE_ID" ]; then
              echo "::notice::No release found for tag v${VERSION} - skipping release notes update"
              exit 0
            fi
          fi

          # Get existing release body
          EXISTING_BODY=$(gh api repos/${{ github.repository }}/releases/$RELEASE_ID --jq '.body // ""')

          # Check if install instructions already exist (avoid duplication)
          if echo "$EXISTING_BODY" | grep -q "## Quick Install"; then
            echo "Install instructions already present, skipping update"
            exit 0
          fi

          # Create install instructions file
          cat > /tmp/install_instructions.md << 'EOF'
          ## Quick Install

          **Prerequisites:** Docker and Docker Compose

          ```bash
          git clone https://github.com/nekoguntai-castle/sanctuary.git
          cd sanctuary
          ./install.sh
          ```

          Open **https://localhost:8443** and log in with:
          - **Username:** `admin`
          - **Password:** `sanctuary`

          > Change these credentials immediately after first login.

          ---

          ## Upgrading

          Your data and configuration will be preserved automatically.

          ```bash
          cd sanctuary
          git pull
          ./install.sh
          ```

          The install script handles database migrations and restarts services.

          ---

          For Umbrel, install via the [`sanctuary-umbrel`](https://github.com/nekoguntai-castle/sanctuary-umbrel) community app store. Limitations and full instructions there.

          ---
          EOF
          # Remove leading spaces from heredoc content
          sed -i 's/^          //' /tmp/install_instructions.md

          # Build final release body
          if [ -n "$EXISTING_BODY" ]; then
            cat /tmp/install_instructions.md > /tmp/release_body.md
            echo -e "\n## What's New\n" >> /tmp/release_body.md
            echo "$EXISTING_BODY" >> /tmp/release_body.md
          else
            cat /tmp/install_instructions.md > /tmp/release_body.md
          fi

          gh release edit "v$VERSION" --notes-file /tmp/release_body.md
          echo "Updated release notes"

      - name: Convert pre-release to full release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.create-manifests.outputs.version }}
        run: |
          echo "All validation passed! Converting pre-release to full release..."

          # Remove pre-release flag (converts release candidate to full release)
          gh release edit "v$VERSION" --prerelease=false

          # Only mark as latest for stable versions (not -rc, -alpha, -beta)
          if [[ "$VERSION" != *-rc* && "$VERSION" != *-alpha* && "$VERSION" != *-beta* ]]; then
            gh release edit "v$VERSION" --latest
            echo "✓ v$VERSION is now a full release and marked as latest"
          else
            echo "✓ v$VERSION is now a full release (not marked as latest due to pre-release suffix)"
          fi
