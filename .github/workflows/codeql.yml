name: CodeQL

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    - cron: '37 8 * * 1'
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || github.event_name == 'push' }}

jobs:
  detect-codeql-languages:
    name: Detect CodeQL Languages
    runs-on: ubuntu-latest
    outputs:
      actions_changed: ${{ steps.classify.outputs.actions_changed }}
      javascript_typescript_changed: ${{ steps.classify.outputs.javascript_typescript_changed }}
      go_changed: ${{ steps.classify.outputs.go_changed }}
      python_changed: ${{ steps.classify.outputs.python_changed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Classify CodeQL language scope
        id: classify
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          WORKFLOW_SHA: ${{ github.sha }}
        run: bash scripts/ci/classify-codeql-languages.sh

  codeql-actions:
    name: CodeQL / Actions
    runs-on: ubuntu-latest
    needs: [detect-codeql-languages]
    if: needs.detect-codeql-languages.outputs.actions_changed == 'true'
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Initialize CodeQL
        uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225
        with:
          languages: actions
          queries: security-extended

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225
        with:
          category: '/language:actions'

  codeql-javascript-typescript:
    name: CodeQL / JavaScript-TypeScript
    runs-on: ubuntu-latest
    needs: [detect-codeql-languages]
    if: needs.detect-codeql-languages.outputs.javascript_typescript_changed == 'true'
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Initialize CodeQL
        uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225
        with:
          languages: javascript-typescript
          queries: security-extended

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225
        with:
          category: '/language:javascript-typescript'

  codeql-go:
    name: CodeQL / Go
    runs-on: ubuntu-latest
    needs: [detect-codeql-languages]
    if: needs.detect-codeql-languages.outputs.go_changed == 'true'
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Initialize CodeQL
        uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225
        with:
          languages: go
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@95e58e9a2cdfd71adc6e0353d5c52f41a045d225

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225
        with:
          category: '/language:go'

  codeql-python:
    name: CodeQL / Python
    runs-on: ubuntu-latest
    needs: [detect-codeql-languages]
    if: needs.detect-codeql-languages.outputs.python_changed == 'true'
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Initialize CodeQL
        uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225
        with:
          languages: python
          queries: security-extended

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225
        with:
          category: '/language:python'

  codeql-required-checks:
    name: CodeQL Required Checks
    runs-on: ubuntu-latest
    needs:
      - detect-codeql-languages
      - codeql-actions
      - codeql-javascript-typescript
      - codeql-go
      - codeql-python
    if: always()
    steps:
      - name: Check CodeQL job results
        env:
          DETECT_CODEQL_LANGUAGES: ${{ needs.detect-codeql-languages.result }}
          ACTIONS_CHANGED: ${{ needs.detect-codeql-languages.outputs.actions_changed }}
          JAVASCRIPT_TYPESCRIPT_CHANGED: ${{ needs.detect-codeql-languages.outputs.javascript_typescript_changed }}
          GO_CHANGED: ${{ needs.detect-codeql-languages.outputs.go_changed }}
          PYTHON_CHANGED: ${{ needs.detect-codeql-languages.outputs.python_changed }}
          CODEQL_ACTIONS: ${{ needs.codeql-actions.result }}
          CODEQL_JAVASCRIPT_TYPESCRIPT: ${{ needs.codeql-javascript-typescript.result }}
          CODEQL_GO: ${{ needs.codeql-go.result }}
          CODEQL_PYTHON: ${{ needs.codeql-python.result }}
        run: |
          failed=false

          require_success() {
            name="$1"
            result="$2"
            if [ "$result" != "success" ]; then
              echo "::error::$name result was $result; expected success"
              failed=true
            else
              echo "$name: $result"
            fi
          }

          allow_success_or_skipped() {
            name="$1"
            result="$2"
            case "$result" in
              success|skipped)
                echo "$name: $result"
                ;;
              *)
                echo "::error::$name result was $result; expected success or skipped"
                failed=true
                ;;
            esac
          }

          require_when_relevant() {
            name="$1"
            result="$2"
            relevant="$3"
            if [ "$relevant" = "true" ]; then
              require_success "$name" "$result"
            else
              allow_success_or_skipped "$name" "$result"
            fi
          }

          require_success "Detect CodeQL Languages" "$DETECT_CODEQL_LANGUAGES"
          require_when_relevant "CodeQL / Actions" "$CODEQL_ACTIONS" "$ACTIONS_CHANGED"
          require_when_relevant "CodeQL / JavaScript-TypeScript" "$CODEQL_JAVASCRIPT_TYPESCRIPT" "$JAVASCRIPT_TYPESCRIPT_CHANGED"
          require_when_relevant "CodeQL / Go" "$CODEQL_GO" "$GO_CHANGED"
          require_when_relevant "CodeQL / Python" "$CODEQL_PYTHON" "$PYTHON_CHANGED"

          if [ "$failed" = "true" ]; then
            exit 1
          fi
